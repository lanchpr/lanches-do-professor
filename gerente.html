<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Central - Lanches do Professor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --manager: #8e44ad; --primary: #1a252f; --success: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f1f2f6; }
        * { box-sizing: border-box; }
        body { height: 100dvh; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
        
        .main-wrapper { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: var(--manager); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .card { background: white; padding: 12px; border-radius: 8px; border-left: 5px solid var(--manager); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card small { font-size: 10px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
        .card div { font-size: 18px; font-weight: 900; }

        .content { display: grid; grid-template-columns: 320px 1fr; gap: 10px; flex: 1; min-height: 0; }
        @media (max-width: 850px) { .content { grid-template-columns: 1fr; } }

        .panel { background: white; border-radius: 8px; padding: 15px; border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .scroll { flex: 1; overflow-y: auto; }
        
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-top: 15px; }
        .btn-add { background: var(--success); }
        .btn-reset { background: var(--danger); font-size: 11px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn-edit { background: var(--info); border: none; color: white; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .bg-success { background: #d4edda; color: #155724; }
        .bg-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://i.postimg.cc/bYCjz5WZ/Picsart-25-11-03-11-29-40-541.png" style="width: 80px; margin-bottom: 15px;">
        <h2>Gestão Central</h2>
        <input type="text" id="login-user" placeholder="Login">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn btn-add" onclick="verificarLogin()">ENTRAR</button>
    </div>
</div>

<div class="main-wrapper" id="main-content">
    <div class="header-bar">
        <span><i class="fa-solid fa-crown"></i> <b>CONTROLE TOTAL DO PROFESSOR</b></span>
        <div style="display:flex; gap:10px;">
            <button onclick="window.baixarRelatorio()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            <button onclick="window.reiniciarApp()" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold;">REINICIAR DIA</button>
        </div>
    </div>

    <div class="stats">
        <div class="card"><small>Entradas</small><div id="total-ent">0</div></div>
        <div class="card" style="border-left-color: var(--success)"><small>Vendidos</small><div id="total-vend">0</div></div>
        <div class="card" style="border-left-color: var(--danger)"><small>Saídas</small><div id="total-sai">0</div></div>
        <div class="card" style="border-left-color: var(--info)"><small>Saldo</small><div id="total-sal">0</div></div>
    </div>

    <div class="content">
        <div class="panel">
            <h4 style="margin:0"><i class="fa-solid fa-cart-plus"></i> Abastecer Loja</h4>
            <label>Escolha o Produto:</label>
            <select id="prod-select">
                <optgroup label="Cafés"><option>Café P</option><option>Café M</option><option>Café G</option><option>Café Extra</option><option>Café Especial</option></optgroup>
                <optgroup label="Bebidas"><option>Coca Lata</option><option>Coquinha</option><option>Guaraná Nat.</option><option>Água Gás</option><option>Água Nat.</option><option>Rodízio Cana</option><option>Caldo Garrafa</option></optgroup>
                <optgroup label="Alimentos"><option>Pastel Especial</option><option>Pastel Comum</option><option>Salgado</option><option>Bolo Fatia</option></optgroup>
                <optgroup label="Outros"><option>Cigarro Var.</option><option>Cigarro G</option><option>Bala Drop</option></optgroup>
            </select>
            <label>Quantidade a ADICIONAR:</label>
            <input type="number" id="prod-qty" value="10">
            <button class="btn btn-add" onclick="window.lancarRapido()">SOMAR AO ESTOQUE</button>
            
            <p style="font-size:11px; color:#666; margin-top:20px; line-height:1.4;">
                * Use este bloco para entradas rápidas.<br>
                * Use o botão "Editar" na tabela para correções específicas de venda ou perda.
            </p>
        </div>

        <div class="panel">
            <h4 style="margin:0 0 10px 0"><i class="fa-solid fa-list-check"></i> Auditoria de Lançamentos</h4>
            <div class="scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Entrada</th>
                            <th>Vendido</th>
                            <th>Saída</th>
                            <th>Saldo</th>
                            <th>Editar</th>
                        </tr>
                    </thead>
                    <tbody id="audit-table"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsqDoeAaHoYc1jhstaldVXfnPRMrUPPwo",
        authDomain: "lanches-do-professor.firebaseapp.com",
        projectId: "lanches-do-professor",
        storageBucket: "lanches-do-professor.firebasestorage.app",
        messagingSenderId: "805888557726",
        appId: "1:805888557726:web:41f2ad48ebbc8aac0f318f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const listaProdutos = [
        'Café P', 'Café M', 'Café G', 'Café Extra', 'Café Especial', 
        'Coca Lata', 'Coquinha', 'Guaraná Nat.', 'Água Gás', 'Água Nat.', 'Rodízio Cana', 'Caldo Garrafa',
        'Pastel Especial', 'Pastel Comum', 'Salgado', 'Bolo Fatia',
        'Cigarro Var.', 'Cigarro G', 'Bala Drop'
    ];

    let dadosAtuais = {};

    window.verificarLogin = () => {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(u === "ADM" && p === "bla19841984") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        } else { alert("Login ou senha incorretos!"); }
    };

    onValue(ref(db, 'lanches/estoque_manual'), (snapshot) => {
        dadosAtuais = snapshot.val() || {};
        renderizarTabela(dadosAtuais);
    });

    function renderizarTabela(data) {
        const tbody = document.getElementById('audit-table');
        tbody.innerHTML = "";
        let tEnt = 0, tVend = 0, tSai = 0, tSal = 0;

        listaProdutos.forEach(prod => {
            const info = data[prod] || { entrada: 0, vendido: 0, saida: 0 };
            const saldo = info.entrada - info.vendido - info.saida;
            tEnt += info.entrada; tVend += info.vendido; tSai += info.saida; tSal += saldo;

            tbody.innerHTML += `
                <tr>
                    <td><b>${prod}</b></td>
                    <td>${info.entrada}</td>
                    <td>${info.vendido}</td>
                    <td>${info.saida}</td>
                    <td><span class="badge ${saldo < 0 ? 'bg-danger' : 'bg-success'}">${saldo}</span></td>
                    <td><button class="btn-edit" onclick="window.abrirModalEdicao('${prod}', ${info.entrada}, ${info.vendido}, ${info.saida})"><i class="fa-solid fa-pencil"></i></button></td>
                </tr>`;
        });

        document.getElementById('total-ent').innerText = tEnt;
        document.getElementById('total-vend').innerText = tVend;
        document.getElementById('total-sai').innerText = tSai;
        document.getElementById('total-sal').innerText = tSal;
    }

    // FUNÇÃO DO BLOCO DE LANÇAMENTO (ADICIONAR)
    window.lancarRapido = () => {
        const p = document.getElementById('prod-select').value;
        const q = parseInt(document.getElementById('prod-qty').value);
        if(isNaN(q)) return;

        const infoAntiga = dadosAtuais[p] || { entrada: 0, vendido: 0, saida: 0 };
        set(ref(db, 'lanches/estoque_manual/' + p), {
            ...infoAntiga,
            entrada: infoAntiga.entrada + q
        });
        alert(`+${q} adicionados ao estoque de ${p}`);
    };

    // FUNÇÃO DA TABELA (EDITAR VALOR ESPECÍFICO)
    window.abrirModalEdicao = (nome, ent, vend, sai) => {
        const nEnt = prompt(`[${nome}] - Mudar TOTAL ENTRADA para:`, ent);
        if (nEnt === null) return;
        const nVend = prompt(`[${nome}] - Mudar TOTAL VENDIDO para:`, vend);
        if (nVend === null) return;
        const nSai = prompt(`[${nome}] - Mudar TOTAL SAÍDA para:`, sai);
        if (nSai === null) return;

        set(ref(db, 'lanches/estoque_manual/' + nome), {
            entrada: parseInt(nEnt) || 0,
            vendido: parseInt(nVend) || 0,
            saida: parseInt(nSai) || 0
        });
    };

    window.reiniciarApp = () => {
        if(confirm("LIMPAR TUDO? Isso apaga todas as vendas e estoques do dia!")) {
            remove(ref(db, 'lanches/'));
        }
    };

    window.baixarRelatorio = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Auditoria Global - Lanches do Professor", 14, 15);
        const rows = Array.from(document.querySelectorAll("#audit-table tr")).map(tr => 
            Array.from(tr.cells).slice(0, 5).map(td => td.innerText)
        );
        doc.autoTable({ startY: 25, head: [['Produto', 'Entrada', 'Vendido', 'Saída', 'Saldo']], body: rows });
        doc.save("Relatorio_Professor.pdf");
    };
</script>
</body>
</html>
