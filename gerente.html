<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Central - Lanches do Professor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --manager: #8e44ad; --primary: #1a252f; --success: #27ae60; --danger: #e74c3c; --bg: #f1f2f6; }
        * { box-sizing: border-box; }
        body { height: 100dvh; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        
        /* Tela de Login */
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
        
        /* Layout Principal */
        .main-wrapper { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: var(--manager); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .card { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid var(--manager); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card small { font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
        .card div { font-size: 20px; font-weight: 900; }
        
        .content { display: grid; grid-template-columns: 320px 1fr; gap: 10px; flex: 1; min-height: 0; }
        @media (max-width: 800px) { .content { grid-template-columns: 1fr; } }
        
        .panel { background: white; border-radius: 8px; padding: 15px; border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .scroll { flex: 1; overflow-y: auto; }
        
        label { font-size: 12px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; margin-bottom: 10px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-add { background: var(--success); }
        .btn-reset { background: transparent; color: #999; border: 1px solid #eee; font-size: 10px; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .btn-edit { background: none; border: none; color: #3498db; cursor: pointer; font-size: 14px; }
        .operador-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="https://i.postimg.cc/bYCjz5WZ/Picsart-25-11-03-11-29-40-541.png" style="width: 80px; margin-bottom: 15px;">
        <h2 style="margin: 0 0 20px 0; color: var(--primary);">Área do Gestor</h2>
        <input type="text" id="login-user" placeholder="Login">
        <input type="password" id="login-pass" placeholder="Senha">
        <button class="btn btn-add" style="background: var(--manager);" onclick="verificarLogin()">ENTRAR</button>
    </div>
</div>

<div class="main-wrapper" id="main-content">
    <div class="header-bar">
        <span><i class="fa-solid fa-crown"></i> <b>GESTOR ONLINE - LANCHES DO PROFESSOR</b></span>
        <button onclick="window.baixarRelatorio()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:5px;"><i class="fa-solid fa-file-pdf"></i> PDF DIA</button>
    </div>

    <div class="stats">
        <div class="card"><small>Vendido Hoje</small><div id="total-vendas">R$ 0,00</div></div>
        <div class="card" style="border-left-color: #3498db"><small>Entradas Total</small><div id="total-entradas">0 un</div></div>
        <div class="card" style="border-left-color: var(--danger)"><small>Operadores Ativos</small><div id="total-ops">0</div></div>
    </div>

    <div class="content">
        <div class="panel">
            <h4 style="margin:0 0 10px 0">Abastecer / Editar</h4>
            <label>Produto:</label>
            <select id="prod-select">
                <optgroup label="Cafés"><option>Café P</option><option>Café M</option><option>Café G</option><option>Café Extra</option><option>Café Especial</option></optgroup>
                <optgroup label="Bebidas"><option>Coca Lata</option><option>Coquinha</option><option>Guaraná Nat.</option><option>Água Gás</option><option>Água Nat.</option><option>Rodízio Cana</option><option>Caldo Garrafa</option></optgroup>
                <optgroup label="Alimentos"><option>Pastel Especial</option><option>Pastel Comum</option><option>Salgado</option><option>Bolo Fatia</option></optgroup>
                <optgroup label="Outros"><option>Cigarro Var.</option><option>Cigarro G</option><option>Bala Drop</option></optgroup>
            </select>
            <label>Quantidade:</label>
            <input type="number" id="prod-qty" value="10">
            <button class="btn btn-add" onclick="window.lancarEntrada()">ADICIONAR ENTRADA</button>

            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            
            <h4 style="margin:0 0 10px 0">Vendas por Operador</h4>
            <div id="lista-operadores"></div>
            
            <button class="btn btn-reset" onclick="window.zerarTudo()">ENCERRAR TUDO (ZERAR DIA)</button>
        </div>

        <div class="panel">
            <h4 style="margin:0 0 10px 0">Auditoria e Saldo (Clique no <i class="fa-solid fa-pencil"></i> para editar)</h4>
            <div class="scroll">
                <table>
                    <thead><tr><th>Produto</th><th>Entrada</th><th>Vendido</th><th>Saldo</th><th>Ação</th></tr></thead>
                    <tbody id="audit-table"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsqDoeAaHoYc1jhstaldVXfnPRMrUPPwo",
        authDomain: "lanches-do-professor.firebaseapp.com",
        projectId: "lanches-do-professor",
        storageBucket: "lanches-do-professor.firebasestorage.app",
        messagingSenderId: "805888557726",
        appId: "1:805888557726:web:41f2ad48ebbc8aac0f318f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let dbLocal = { entradas: {}, vendas: [] };

    // Login
    window.verificarLogin = () => {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(u === "ADM" && p === "bla19841984") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        } else {
            alert("Login ou Senha incorretos!");
        }
    };

    onValue(ref(db, 'lanches/'), (snapshot) => {
        const data = snapshot.val();
        if(data) {
            dbLocal.entradas = data.entradas || {};
            dbLocal.vendas = data.vendas ? Object.values(data.vendas) : [];
            sincronizarUI();
        } else {
            document.getElementById('audit-table').innerHTML = "";
            document.getElementById('total-vendas').innerText = "R$ 0,00";
        }
    });

    window.lancarEntrada = () => {
        const p = document.getElementById('prod-select').value;
        const q = parseInt(document.getElementById('prod-qty').value);
        if(isNaN(q)) return;
        const novaQtd = (dbLocal.entradas[p] || 0) + q;
        set(ref(db, 'lanches/entradas/' + p), novaQtd);
        alert("Entrada lançada!");
    };

    window.editarEntradaManual = (produto) => {
        const atual = dbLocal.entradas[produto] || 0;
        const nova = prompt(`Editar total de ENTRADA para ${produto}:\n(Valor atual: ${atual})`, atual);
        if (nova !== null) {
            set(ref(db, 'lanches/entradas/' + produto), parseInt(nova));
        }
    };

    function sincronizarUI() {
        const tbody = document.getElementById('audit-table');
        const listaOps = document.getElementById('lista-operadores');
        tbody.innerHTML = "";
        listaOps.innerHTML = "";
        
        let totalR$ = 0, resumoVendas = {}, resumoOperadores = {}, entTotal = 0;

        dbLocal.vendas.forEach(v => {
            totalR$ += v.total;
            resumoOperadores[v.operador] = (resumoOperadores[v.operador] || 0) + v.total;
            v.itens.forEach(i => resumoVendas[i.nome] = (resumoVendas[i.nome] || 0) + 1);
        });

        // Tabela de Auditoria
        const prods = new Set([...Object.keys(dbLocal.entradas), ...Object.keys(resumoVendas)]);
        Array.from(prods).sort().forEach(nome => {
            const ent = dbLocal.entradas[nome] || 0;
            const vend = resumoVendas[nome] || 0;
            const saldo = ent - vend;
            entTotal += ent;

            tbody.innerHTML += `
                <tr>
                    <td><b>${nome}</b></td>
                    <td>${ent}</td>
                    <td>${vend}</td>
                    <td style="color:${saldo < 0 ? 'red' : 'inherit'}">${saldo}</td>
                    <td><button class="btn-edit" onclick="window.editarEntradaManual('${nome}')"><i class="fa-solid fa-pencil"></i></button></td>
                </tr>`;
        });

        // Lista por Operador
        Object.keys(resumoOperadores).forEach(op => {
            listaOps.innerHTML += `
                <div class="operador-item">
                    <span>${op.toUpperCase()}</span>
                    <b>R$ ${resumoOperadores[op].toFixed(2)}</b>
                </div>`;
        });

        document.getElementById('total-vendas').innerText = `R$ ${totalR$.toFixed(2).replace('.', ',')}`;
        document.getElementById('total-entradas').innerText = entTotal + " un";
        document.getElementById('total-ops').innerText = Object.keys(resumoOperadores).length;
    }

    window.zerarTudo = () => {
        if(confirm("Zerar tudo apagará as vendas e o estoque na nuvem. Confirma?")) {
            remove(ref(db, 'lanches/'));
        }
    };

    window.baixarRelatorio = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatorio Gerencial Lanches do Professor", 14, 15);
        const rows = [];
        const table = document.getElementById('audit-table');
        for (let row of table.rows) {
            rows.push([row.cells[0].innerText, row.cells[1].innerText, row.cells[2].innerText, row.cells[3].innerText]);
        }
        doc.autoTable({ startY: 25, head: [['Prod', 'Ent', 'Vend', 'Saldo']], body: rows });
        doc.save("Fechamento_Online.pdf");
    };
</script>
</body>
</html>
